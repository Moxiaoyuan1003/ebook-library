appId: com.ebook-library.app
productName: 个人图书管理
directories:
  output: release

files:
  - dist/**/*
  - electron-dist/**/*

extraResources:
  - from: ../backend/dist/
    to: backend
    filter:
      - "backend*"

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: resources/icon.png

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  icon: resources/icon.png

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: resources/icon.png
  maintainer: Moxiaoyuan1003 <moxiaoyuan1003@users.noreply.github.com>
  category: Office

