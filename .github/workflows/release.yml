name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ── Backend ──
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Build backend with PyInstaller
        run: |
          cd backend
          pyinstaller backend.spec --clean --noconfirm

      # ── Frontend ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Electron app
        run: |
          cd frontend
          npm run electron:build:${{ matrix.platform }}

      # ── Publish ──
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/release/*.exe
            frontend/release/*.dmg
            frontend/release/*.zip
            frontend/release/*.AppImage
            frontend/release/*.deb
            frontend/release/*.yml
            frontend/release/*.yaml
            frontend/release/*.blockmap
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
