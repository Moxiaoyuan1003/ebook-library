name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ── Backend ──
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build backend with PyInstaller
        working-directory: backend
        run: pyinstaller backend.spec --clean --noconfirm

      - name: Verify backend binary exists
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "win" ]; then
            test -f backend/dist/backend.exe
          else
            test -f backend/dist/backend
          fi
          echo "Backend binary OK"

      # ── Frontend ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Electron app
        working-directory: frontend
        env:
          # Skip code signing in CI (no certificates configured)
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run electron:build:${{ matrix.platform }}

      # ── Publish ──
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/release/*.exe
            frontend/release/*.dmg
            frontend/release/*.zip
            frontend/release/*.AppImage
            frontend/release/*.deb
            frontend/release/*.yml
            frontend/release/*.yaml
            frontend/release/*.blockmap
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
